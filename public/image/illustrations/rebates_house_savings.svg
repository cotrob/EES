<svg width="264" height="220" viewBox="0 0 480 400" fill="none" xmlns="http://www.w3.org/2000/svg">

 <g transform="translate(-20, 0)">
  <!-- House body -->
  <rect x="120" y="200" width="200" height="140" rx="4" fill="#E8EDF2" stroke="#162A45" stroke-width="2"/>

  <!-- Door -->
  <rect x="195" y="280" width="50" height="60" rx="3" fill="#162A45"/>
  <circle cx="236" cy="313" r="3" fill="#E8EDF2"/>

  <!-- Window left -->
  <rect x="140" y="225" width="40" height="35" rx="2" fill="#162A45" opacity="0.15" stroke="#162A45" stroke-width="1.5"/>
  <line x1="160" y1="225" x2="160" y2="260" stroke="#162A45" stroke-width="1"/>
  <line x1="140" y1="242" x2="180" y2="242" stroke="#162A45" stroke-width="1"/>

  <!-- Window right -->
  <rect x="260" y="225" width="40" height="35" rx="2" fill="#162A45" opacity="0.15" stroke="#162A45" stroke-width="1.5"/>
  <line x1="280" y1="225" x2="280" y2="260" stroke="#162A45" stroke-width="1"/>
  <line x1="260" y1="242" x2="300" y2="242" stroke="#162A45" stroke-width="1"/>

  <!-- Roof -->
  <path d="M100 205 L220 120 L340 205" fill="#162A45" stroke="#162A45" stroke-width="2" stroke-linejoin="round"/>

  <!-- Solar panels on roof (3 panels) -->
  <g transform="rotate(-24.5, 220, 162)">
    <!-- Panel 1 -->
    <rect x="148" y="142" width="42" height="28" rx="2" fill="#2D5F8A" stroke="#162A45" stroke-width="1.5"/>
    <line x1="162" y1="142" x2="162" y2="170" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>
    <line x1="176" y1="142" x2="176" y2="170" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>
    <line x1="148" y1="156" x2="190" y2="156" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>

    <!-- Panel 2 -->
    <rect x="195" y="142" width="42" height="28" rx="2" fill="#2D5F8A" stroke="#162A45" stroke-width="1.5"/>
    <line x1="209" y1="142" x2="209" y2="170" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>
    <line x1="223" y1="142" x2="223" y2="170" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>
    <line x1="195" y1="156" x2="237" y2="156" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>

    <!-- Panel 3 -->
    <rect x="242" y="142" width="42" height="28" rx="2" fill="#2D5F8A" stroke="#162A45" stroke-width="1.5"/>
    <line x1="256" y1="142" x2="256" y2="170" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>
    <line x1="270" y1="142" x2="270" y2="170" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>
    <line x1="242" y1="156" x2="284" y2="156" stroke="#162A45" stroke-width="0.75" opacity="0.5"/>
  </g>

  <!-- Ground line -->
  <line x1="60" y1="340" x2="420" y2="340" stroke="#162A45" stroke-width="1.5" opacity="0.3"/>

  <!-- Cost down arrow (right side) -->
  <g transform="translate(370, 140)">
    <!-- Dollar sign circle -->
    <circle cx="30" cy="0" r="28" fill="#162A45"/>
    <text x="30" y="8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white">$</text>

    <!-- Downward arrow shaft -->
    <rect x="24" y="32" width="12" height="100" rx="6" fill="#162A45"/>

    <!-- Arrow head -->
    <path d="M10 120 L30 155 L50 120" fill="#162A45" stroke="#162A45" stroke-width="2" stroke-linejoin="round"/>

    <!-- Percentage lines (showing reduction) -->
    <g opacity="0.4">
      <line x1="55" y1="55" x2="80" y2="55" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
      <line x1="55" y1="75" x2="72" y2="75" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
      <line x1="55" y1="95" x2="64" y2="95" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Small decorative elements -->
  <!-- Sun rays (top left) -->
  <g transform="translate(65, 80)" opacity="0.25">
    <circle cx="0" cy="0" r="12" fill="#162A45"/>
    <line x1="-22" y1="0" x2="-16" y2="0" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="0" x2="22" y2="0" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="0" y2="-16" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="16" x2="0" y2="22" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    <line x1="-15" y1="-15" x2="-11" y2="-11" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    <line x1="11" y1="-11" x2="15" y2="-15" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    <line x1="-15" y1="15" x2="-11" y2="11" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
    <line x1="11" y1="11" x2="15" y2="15" stroke="#162A45" stroke-width="2" stroke-linecap="round"/>
  </g>
 </g>

</svg>
